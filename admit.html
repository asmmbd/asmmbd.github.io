<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title> প্রবেশ পত্র </title>
  <link href='https://fonts.maateen.me/solaiman-lipi/font.css' rel='stylesheet' />
  <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    * {
      font-family: SolaimanLipi;
    }

    .page {
      width: 29.7cm;
      height: 21cm;
    }

    .page img {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

  <div class="w-full admit" x-data="data()">
   <template x-for="student in students">
    <div class="page relative">
      <img src="/images/20240220_144802.jpg" alt="">
      <div class="w-full absolute top-32 left-0 text-center">
        <h1 class="text-center font-bold text-xl" x-text="examName + ' - প্রবেশ পত্র'"></h1>
      </div>
      <div class="w-full absolute top-48 left-0 px-10">
        <table class="w-full text-sm text-left border border-gray-400">
          <tbody>
            <tr class="border-b border-gray-400">
              <th scope="row" class="px-2 py-1 border-r border-gray-400">
                নাম
              </th>
              <td class="px-2 py-1 border-r border-gray-400" x-text="student?.stname">
                আয়েশা সিদ্দিকা মনিরা
              </td>
              <th class="px-2 py-1 border-r border-gray-400">
                আইডি নং
              </th>
              <td class="px-2 py-1 border-r border-gray-400" x-text="getBangla(student?.studentId)">
                ২০২৪০০০১
              </td>
            </tr>
            <tr class="border-b border-gray-400">
              <th class="px-2 py-1 border-r border-gray-400">
                পিতার নাম
              </th>
              <td class="px-2 py-1 border-r border-gray-400" x-text="student?.faName">
                আলামীন হোসেন
              </td>
              <th class="px-2 py-1 border-r border-gray-400">
                জামাত
              </th>
              <td class="px-2 py-1 border-r border-gray-400" x-text="student?.class">
                মিজান
              </td>
            </tr>
            <tr class="border-b border-gray-400">
              <th scope="row" class="px-2 py-1 border-r border-gray-400">
                মাতার নাম
              </th>
              <td class="px-2 py-1 border-r border-gray-400" x-text="student?.maName">
                আমেনা খাতুন
              </td>
              <th class="px-2 py-1 border-r border-gray-400">
                বিভাগ
              </th>
              <td class="px-2 py-1" x-text="student?.group">
                কিতাব বিভাগ
              </td>
            </tr>
            <tr class="border-b border-gray-400">
              <th scope="row" class="px-2 py-1 border-r border-gray-400">
               পরীক্ষা আরম্ভের তারিখ
              </th>
              <td class="px-2 py-1 border-r border-gray-400">
                ২/০৩/২০২৪
              </td>
              <th class="px-2 py-1 border-r border-gray-400">
                পরীক্ষার সময়
              </th>
              <td class="px-2 py-1">
                ০৯.০০ - ১২.০০
              </td>
            </tr>
          </tbody>
        </table>
        <div class="px-2 py-4 border border-gray-400 mt-5">
          <p>
            <span class="font-bold text-lg"> পরীক্ষার্থীদের জন্য পালনীয় বিধিবিধান </span><br>
            ১। সকল পরীক্ষার্থীদেরকে পরীক্ষা কেন্দ্রে প্রবেশের সময় প্রবেশপত্র সঙ্গে রাখতে হবে এবং কলম ব্যতীত অন্য
            কোন কিতাব বা কাগজপত্র ও মোবাইল সঙ্গে নিতে পারবে না। <br>
            ২। পরীক্ষা কেন্দ্রে প্রথম দিন পরীক্ষা আরম্ভের এক ঘণ্টা পূর্বে এবং অন্যান্য দিন আধঘন্টা পূর্বে খোলা হবে।
            <br>
            ৩। পরীক্ষা আরম্ভ ও শেষ হওয়ার ১৫ মিনিট
            পূর্বে সতর্কীকরণ ঘন্টা বাজিবার সাথে সাথে পরীক্ষার্থীরা নিজ নিজ আসনে নীরবে বসে পড়বে।
            <br>
            ৪। পরীক্ষা আরম্ভ হওয়ার আধঘন্টা পর কোন পরীক্ষার্থীকে হলে প্রবেশ করতে দেওয়া হবে না। আধঘন্টা পূর্বে
            বাজানো হবে, প্রথম
            সতর্কীকরণ
            ঘন্টা
            আসলে হলপরিচালকের অনুমতি সাপেক্ষে প্রবেশ করতে পারবে। <br>
            ৫। এক ঘন্টা অতিবাহিত হওয়ার পূর্বে কোন পরীক্ষার্থীর খাতা জমা নেওয়া হবে না। <br>
            ৬। কোন প্রয়োজন দেখা দিলে নিজ স্থানে চুপচাপ দাঁড়িয়ে যাবে ওই স্থান ত্যাগ করবে না এবং শব্দ করবেনা। <br>
            ৭। পরীক্ষার্থীদের কালো কালি ব্যতীত অন্য কোন কালী এবং পেন্সিল ব্যবহার করা নিষিদ্ধ। <br>
            ৮। পরীক্ষার খাতায় প্রশ্নের উত্তর সংশ্লিষ্ট বিষয়ে ব্যতীত অন্য কিছু লেখা কঠিন শাস্তিযোগ্য অপরাধ।
          </p>
        </div>
      </div>
    </div>
   </template>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
  <script>
  const { Client, Databases, Query, ID } = Appwrite;
  const client = new Client();
  client
    .setEndpoint('https://cloud.appwrite.io/v1')
    .setProject('652c1374db243c864a6c');
  const databases = new Databases(client);
    function data(){
      return {
        students: [],
        examName:'প্রথম সাময়িক পরীক্ষা ২০২৪',
        searchStudent() {
          const promise = databases.listDocuments('652c16162f939c821f75', '652c16266c0f7c2fccd8');
          promise.then((ress) => {
            this.students = ress.documents;
            console.log(this.students)
          }, function(error) {
            console.log(error);
          });
        },
        getBangla(x) {
          let numbers = { '0': '০', '1': '১', '2': '২', '3': '৩', '4': '৪', '5': '৫', '6': '৬', '7': '৭', '8': '৮', '9': '৯' };
          var retStr = String(x);
          for (let n in numbers) {
            retStr = retStr.replace(new RegExp(n, 'g'), numbers[n]);
          }
          return retStr;
        },
        init(){
          this.searchStudent()
        }
      }
    }
  </script>
</body>

</html>
