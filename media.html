<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet" />
  <style>
    * {
      font-family: SolaimanLipi;
    }
  </style>
</head>

<body class="bg-gray-50">
  <div x-data="videoApp()">
    <!-- Video Player -->
    <template x-if="selectedVideo">
      <div>
        <!-- Full Video Player -->
        <div x-show="!isMinimized" class="w-full fixed top-0 left-0 z-50 bg-white shadow-md">
          <iframe class="w-full h-60" :src="`https://www.youtube.com/embed/${selectedVideo.videoId}`" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen>
          </iframe>
          <div class="p-2">
            <h2 x-text="selectedVideo.title" class="text-[#8b5e34] font-semibold truncate"></h2>
            <p class="text-[#8b5e34] text-sm">
              <span x-text="selectedVideo.channel_name"></span> •
              <span x-text="selectedVideo.category"></span> •
              <span x-text="formatDate(selectedVideo.createdAt)"></span>
            </p>
            <div class="absolute top-2 right-4 flex justify-end gap-2 mt-2">
              <button @click="isMinimized = true" class="text-sm text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-down">
                  <path d="m6 9 6 6 6-6" />
                </svg>
              </button>
              <button @click="closeVideo" class="text-sm text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 6 6 18"></path>
                  <path d="m6 6 12 12"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Draggable Minimized Player -->
        <div x-show="isMinimized" x-ref="draggable" class="fixed z-50 bg-white rounded-md shadow-md flex items-center gap-4 pe-4 cursor-grab" :style="{ top: `${position.y}px`, left: `${position.x}px` }" @touchstart="startDrag($event)" @touchmove="drag($event)" @touchend="stopDrag">
          <img @click="isMinimized = false" class="w-32 h-full rounded-l" :src="`https://img.youtube.com/vi/${selectedVideo.videoId}/maxresdefault.jpg`" alt="Thumbnail" />
          <div class="flex gap-2">
            <button @click="closeVideo" class="text-red-500 focus:outline-none">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </template>

    <!-- Navigation Bar -->
    <nav class="fixed bottom-4 left-1/2 -translate-x-1/2 z-40 bg-white rounded-md shadow-md w-84">
      <ul class="flex px-2 py-2 list-none rounded-md">
        <template x-for="(filter, index) in filters" :key="index">
          <li class="flex-auto text-center">
            <button @click="applyFilter(filter)" :class="filter === activeFilter ? 'bg-[#8b5e34] text-white' : 'text-slate-600 hover:bg-gray-200'" class="w-full px-4 py-2 rounded-md text-sm transition">
              <span x-text="filter"></span>
            </button>
          </li>
        </template>
      </ul>
    </nav>

    <!-- Video List -->
    <section :class="selectedVideo && !isMinimized ? 'mt-72' : ''">
      <template x-for="video in filteredVideos" :key="video.id">
        <div @click="selectVideo(video)" class="relative overflow-hidden mb-3 cursor-pointer">
          <img :src="`https://img.youtube.com/vi/${video.videoId}/maxresdefault.jpg`" alt="Thumbnail" class="w-full h-52 object-cover" onerror="this.onerror=null;this.src='https://via.placeholder.com/300';" />
          <span x-text="video.duration" class="absolute top-[170px] right-4 bg-gray-800 text-white text-sm px-2 py-0.5 rounded-md font-semibold"></span>
          <div class="p-2">
            <h3 x-text="video.title" class="text-[#8b5e34] font-semibold truncate"></h3>
            <p class="text-[#8b5e34] text-sm">
              <span x-text="video.channel_name"></span> •
              <span x-text="video.category"></span> •
              <span x-text="formatDate(video.createdAt)"></span>
            </p>
          </div>
        </div>
      </template>

      <!-- No Videos Found -->
      <template x-if="filteredVideos.length === 0">
        <div class="text-center text-gray-500 mt-20">No videos found for this category.</div>
      </template>
    </section>
  </div>

  <!-- JavaScript Logic -->
  <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
  <script>
    function videoApp() {
      return {
        videos: [],
        filteredVideos: [],
        selectedVideo: null,
        filters: ['All', 'Hadis', 'Quran', 'Story', 'Nasheed'],
        activeFilter: 'All',
        isMinimized: false,

        // Initialize the app
        init() {
          fetch('https://678ff67e49875e5a1a93fa27.mockapi.io/api/v1/media')
            .then(res => res.json())
            .then(data => {
              this.videos = data;
              this.applyFilter('All');
            })
            .catch(err => console.error('Failed to fetch videos:', err));
        },

        // Apply selected filter
        applyFilter(filter) {
          this.activeFilter = filter;
          this.filteredVideos = this.videos.filter(video =>
            filter === 'All' || video.category.toLowerCase() === filter.toLowerCase()
          );
        },

        // Select video to play
        selectVideo(video) {
          this.selectedVideo = video;
          this.isMinimized = false;
        },

        // Close the video player
        closeVideo() {
          this.selectedVideo = null;
          this.isMinimized = false;
        },

        // Format date to "time ago" format
        formatDate(date) {
          return moment(new Date(date).toUTCString()).fromNow();
        },
        position: { x: window.innerWidth / 2 - 100, y: window.innerHeight - 140 },
        dragOffset: { x: 0, y: 0 },
        isDragging: false,

        startDrag(event) {
          const touch = event.touches[0];
          const draggable = this.$refs.draggable;
          this.dragOffset.x = touch.clientX - draggable.offsetLeft;
          this.dragOffset.y = touch.clientY - draggable.offsetTop;
          this.isDragging = true;
        },

        drag(event) {
          if (!this.isDragging) return;

          const touch = event.touches[0];
          const newX = touch.clientX - this.dragOffset.x;
          const newY = touch.clientY - this.dragOffset.y;

          // Restrict dragging within screen bounds
          const screenWidth = window.innerWidth;
          const screenHeight = window.innerHeight;

          this.position.x = Math.max(0, Math.min(newX, screenWidth - 150)); // Width of player
          this.position.y = Math.max(0, Math.min(newY, screenHeight - 80)); // Height of player
        },

        stopDrag() {
          this.isDragging = false;
        },

        closeVideo() {
          this.isMinimized = false;
        },
      };
    }
  </script>
</body>

</html>
