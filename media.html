<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Kids App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet" />
  <style>
    * {
      font-family: SolaimanLipi;
    }
  </style>
</head>

<body class="bg-gray-50">
  <div x-data="data()" x-init="init()">
    <!-- Video Player -->
    <template x-if="selectedVideo">
      <div class="w-full sticky top-0 left-0 z-50 bg-white shadow-md">
        <iframe class="w-full h-60" :src="`https://www.youtube.com/embed/${selectedVideo?.videoId}`" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen>
        </iframe>
        <div class="p-2">
          <h2 x-text="selectedVideo?.title" class="text-[#8b5e34] font-semibold truncate"></h2>
          <p class="text-[#8b5e34] text-sm">
            <span x-text="selectedVideo?.channel_name"></span> •
            <span x-text="selectedVideo?.category"></span> •
            <span x-text="formater(selectedVideo?.createdAt)"></span>
          </p>
        </div>
      </div>
    </template>

    <!-- Navigation -->
    <div class="w-80 fixed left-1/2 -translate-x-1/2 z-40 bg-white rounded-md shadow-md" :class="selectedVideo ? 'bottom-6' : 'top-4'">
      <ul class="flex flex-wrap px-1.5 py-1.5 list-none rounded-md">
        <template x-for="(filter, index) in filters" :key="index">
          <li class="flex-auto text-center">
            <a @click="applyFilter(filter)"
              class="flex items-center justify-center w-full px-0 py-2 text-sm transition-all ease-in-out rounded-md cursor-pointer"
              :class="filter === activeFilter ? 'bg-[#8b5e34] text-white' : 'text-slate-600 hover:bg-gray-200'">
              <span x-text="filter"></span>
            </a>
          </li>
        </template>
      </ul>
    </div>

    <!-- Video List -->
    <div class="space-y-3" :class="selectedVideo ? 'mt-0' : 'mt-20'">
      <template x-for="video in filteredVideos" :key="video.id">
        <div class="relative overflow-hidden" @click="selectedVideo = video">
          <img :alt="video.title" class="w-full h-52 object-cover" :src="`https://img.youtube.com/vi/${video.videoId}/maxresdefault.jpg`" />
          <span x-text="video.duration" class="absolute top-[170px] right-4 bg-gray-900 text-white py-0.5 px-2 rounded-md font-bold"></span>
          <div class="p-2">
            <h2 x-text="video.title" class="text-[#8b5e34] font-semibold truncate"></h2>
            <p class="text-[#8b5e34] text-sm">
              <span x-text="video.channel_name"></span> •
              <span x-text="video.category"></span> •
              <span x-text="formater(video.createdAt)"></span>
            </p>
          </div>
        </div>
      </template>

      <!-- Fallback when no videos are available -->
      <template x-if="filteredVideos.length === 0">
        <div class="text-center text-gray-600">No videos found for this category.</div>
      </template>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
  <script>
    function data() {
      return {
        videos: [],
        filteredVideos: [],
        selectedVideo: null,
        filters: ['All', 'Hadis', 'Quran', 'Story', 'Nasheed'], // List of filters
        activeFilter: 'All', // Currently active filter

        init() {
          fetch('https://678ff67e49875e5a1a93fa27.mockapi.io/api/v1/media')
            .then(res => res.json())
            .then(data => {
              this.videos = data;
              this.applyFilter('All'); // Default to 'All' filter
            })
            .catch(err => console.error("Failed to fetch videos:", err));
        },

        applyFilter(filter) {
          this.activeFilter = filter;
          this.filteredVideos = this.videos.filter(video => {
            return filter === 'All' || video.category.toLowerCase() === filter.toLowerCase();
          });
        },

        formater(date) {
          return moment(new Date(date).toUTCString()).fromNow();
        },
      };
    }
  </script>
</body>

</html>
