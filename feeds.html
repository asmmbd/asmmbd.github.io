            <div class='absolute top-2 right-2 flex items-center gap-2'>

              </label>
            </div>
          </div>
        </div>
        <div :class="postUrl && 'p-2'">
          <img :src="postUrl" alt="" class="rounded-md">
        </div>

                    </svg>

                        <li>Edit Post</li>
                        <li>delete Post</li>
                        <li>delete Post</li>
                        <li>delete Post</li>
                        <li>delete Post</li>
                        <li>delete Post</li>
                      </ul>
                    </div>
                  </div>
                </div>

                  </button>
                </div>
                <hr class="hidden" />
                <div class='px-2 mt-1.5 w-full flex items-center hidden'>
                  <img class='w-9 h-9 rounded-full' src='/src/avatar.png' alt='Media rounded avatar'>

  <script>
    Date.prototype.fromNow = function() {

      // console.log(this.toUTCString())
      const now = new Date();

      const diffInSeconds = Math.floor((now - this) / 1000);

      const units = [
        { name: 'year', seconds: 60 * 60 * 24 * 365 },
        { name: 'month', seconds: 60 * 60 * 24 * 30 },
        { name: 'day', seconds: 60 * 60 * 24 },
        { name: 'hour', seconds: 60 * 60 },
        { name: 'minute', seconds: 60 },
        { name: 'second', seconds: 1 }, ];

      for (const unit of units) {
        const quotient = Math.floor(diffInSeconds / unit.seconds);
        if (quotient > 0) {
          return `${quotient} ${unit.name}${quotient > 1 ? 's' : ''} ago`;
        }
      }

      return 'just now';
    };

    function data() {
      return {
        postUrl: '',
        postContent: '',
        posts: [],
        perpage: 25,
        loading: false,
        categories: [],
        createPost() {
          this.posts.unshift({
            id: this.posts.length,
            content: this.postContent,
            thumbnail: this.postUrl,
            likes: 7670,
            comments: 578,
            share: 2389,
            date: new Date().toUTCString()
          })

          this.postContent = '';
          this.postUrl = '';
        },
        formatNumber(num) {
          if (num >= 1_000_000) {
            return (num / 1_000_000).toFixed(1) + 'M';
          } else if (num >= 1_000) {
            return (num / 1_000).toFixed(1) + 'K';
          } else {
            return num.toString();
          }
        },
        fetcher() {
          fetch('/src/postsdata.json')
            .then(ress => ress.json())
            .then(data => this.posts = data)
        },
        init() {
          this.fetcher();
          window.addEventListener('scroll', () => {
            const {
              scrollTop,
              scrollHeight,
              clientHeight
            } = document.documentElement;

            if (scrollTop + clientHeight + 1 >= scrollHeight) {
              if (this.perpage < this.posts.length - 1) {
                console.log(scrollTop + clientHeight + 1, scrollHeight)
                this.loading = true
                setTimeout(() => {
                  this.perpage = this.perpage + 10;
                  this.loading = false
                }, 2500)
              }
            }
          });
        }
      }
    }
  </script>
