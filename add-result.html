<!DOCTYPE html>
<html lang="bn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ছাত্রদের রেজাল্ট ম্যানেজমেন্ট</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link href="https://fonts.maateen.me/noto-serif-bengali/font.css" rel="stylesheet">
  
  <style>
    * {
      font-family: 'Noto Serif Bengali', serif;
    }
    
    .page {
      width: 21cm;
      height: 29.9cm;
    }
    
    .page .page-img {
      width: 100%;
      height: 100%;
    }
    
    .flex {
      width: 100%;
      display: flex;
    }
  </style>
</head>

<body class="bg-gray-50 font-sans">
  <div class="p-6 print:p-0">
    <h1 class="print:hidden text-4xl font-bold text-center mb-8 print:mb-8 text-gray-800">মাদ্রাসার রেজাল্ট ম্যানেজমেন্ট</h1>
    
    <div x-data="app()" class="space-y-6 print:space-y-0">
      <!-- Class and Exam Selection -->
      <div class="print:hidden flex items-center justify-between space-x-4 bg-white p-4 rounded-lg shadow-md">
        <div>
          <label class="text-gray-700 font-medium text-lg">শ্রেণি নির্বাচন করুন:</label>
          <select x-model="selectedClass" @change="loadStudents(); loadResults()" class="border rounded-lg p-2 bg-gray-50 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="শিশু">শিশু</option>
            <option value="প্রথম">প্রথম</option>
            <option value="দ্বিতীয়">দ্বিতীয়</option>
            <option value="তৃতীয়">তৃতীয়</option>
            <option value="চতুর্থ">চতুর্থ</option>
            <option value="পঞ্চম">পঞ্চম</option>
            <option value="ষষ্ঠ">ষষ্ঠ</option>
            <option value="সপ্তম">সপ্তম</option>
            <option value="অষ্টম">অষ্টম</option>
            <option value="নবম">নবম</option>
            <option value="দশম">দশম</option>
          </select>
        </div>
        <div>
          <label class="text-gray-700 font-medium text-lg">পরীক্ষা নির্বাচন করুন:</label>
          <select x-model="selectedExam" @change="loadResults()" class="border rounded-lg p-2 bg-gray-50 text-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="প্রথম সাময়িক পরীক্ষা ২০২৪">প্রথম সাময়িক পরীক্ষা ২০২৪</option>
            <option value="বার্ষিক পরীক্ষা ২০২৪">বার্ষিক পরীক্ষা ২০২৪</option>
          </select>
        </div>
        <div>
          <button @click="generateReport()" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition">
            <span x-text="showReport ? 'রিপোর্ট পরিবর্তন করুন' : 'রিপোর্ট তৈরি করুন'"></span>
          </button>
          <button x-show="showReport" @click="printReport()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">
            প্রিন্ট করুন
          </button>
        </div>
      </div>
      
      <!-- Results Table -->
      <div x-show="!showReport" class="print:hidden relative bg-white p-6 rounded-lg shadow-md overflow-x-auto">
        <table class="w-full text-center">
          <thead>
            <tr class="bg-indigo-600 text-white">
              <th scope="col" class="p-3 border-b">ক্রমিক</th>
              <th scope="col" class="p-3 border-b w-60">নাম</th>
              <th scope="col" class="p-3 border-b">স্টুডেন্ট আইডি</th>
              <template x-for="subject in classSubjects[selectedClass]" :key="subject.name">
                <th scope="col" class="p-3 border-b" x-text="subject.name">
                </th>
                
              </template>
              <th scope="col" class="p-3 border-b">মোট নম্বর</th>
              <th scope="col" class="p-3 border-b">গড়</th>
              <th scope="col" class="p-3 border-b">স্ট্যাটাস</th>
              <th scope="col" class="p-3 border-b">পজিশন</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="(student, index) in sortedResults" :key="student.studentId">
              <tr class="hover:bg-gray-100">
                <td class="p-3 border-b text-center" x-text="index + 1"></td>
                <td class="p-3 border-b" x-text="student.name"></td>
                <td class="p-3 border-b text-center" x-text="student.studentId"></td>
                <template x-for="(result, subjIndex) in student.results" :key="result.name">
                  <td class="p-3 border-b">
                    <div class="flex items-center gap-2">
                      <input type="number" x-model.number="student.results[subjIndex].test" @change="updateStudent(student)" class="w-16 border rounded p-1 text-center focus:outline-none focus:ring-2 focus:ring-indigo-500" min="0" max="20">
                      <input type="number" x-model.number="student.results[subjIndex].mark" @change="updateStudent(student)" class="w-16 border rounded p-1 text-center focus:outline-none focus:ring-2 focus:ring-indigo-500" min="0" max="80">
                    </div>
                  </td>
                </template>
                <td class="p-3 border-b text-center" x-text="calculateTotal(student.results)"></td>
                <td class="p-3 border-b text-center" x-text="calculateAverage(student.results)"></td>
                <td class="p-3 border-b text-center" x-text="calculateStatus(calculateAverage(student.results))"></td>
                <td class="p-3 border-b text-center" x-text="calculatePosition(student)"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      
      <!-- Report Modal -->
      <div x-show="showReport" class="w-full bg-white py-4 print:py-0 shadow-md print:shadow-none">
        <template x-for="result in sortedResults" :key="result.studentId">
          <div class="page mx-auto relative">
            <img class="page-img" src="./src/img/result-page.png" alt="">
            <div class="w-full absolute top-20 left-0 text-center">
              <h1 class="text-center font-bold text-5xl"> আয়েশা সিদ্দিকা (রা.) মহিলা মাদরাসা</h1>
              <h1 class="text-center font-bold text-2xl my-2"> মারকাজ মসজিদ পাড়া, কলেজ মোড়, মেহেরপুর। স্থাপিতঃ ২০২২ খ্রি.</h1>
              <h1 class="text-center font-bold text-xl my-2" x-text="result.examName"></h1>
              
              <div class="w-full grid grid-cols-3 place-content-between px-14">
                <div class="place-self-star">
                  <img class="w-32 h-32" src="./src/img/asmm-qr.png" alt="">
                </div>
                <div class="w-52 flex flex-col items-center justify-center">
                  <img class="w-32 h-32" src="./src/img/asmm-logo.png" alt="">
                  <h1 class="font-bold text-xl my-2" x-text="`${result.class} শ্রেণির ফলাফল`"></h1>
                </div>
                <div class="w-48 ml-auto">
                  <table class="w-full text-sm text-left border border-gray-400">
                    <tbody>
                      <tr class="border-b border-gray-400">
                        <td colspan='2' class="px-2 py-0.5 border-gray-400 text-center font-bold">
                          বিভাগ বিভাজন
                        </td>
                      </tr>
                      <tr class="border-b border-gray-400">
                        <td class="px-2 py-0.5 border-r border-gray-400">
                          ৮০ - ১০০
                        </td>
                        <td class="px-2 py-0.5 border-gray-400">
                          মুমতায
                        </td>
                      </tr>
                      <tr class="border-b border-gray-400">
                        <td class="px-2 py-0.5 border-r border-gray-400">
                          ৬৫ - ৭৯
                        </td>
                        <td class="px-2 py-0.5 border-gray-400">
                          জায়্যিদ জিদ্দান
                        </td>
                      </tr>
                      <tr class="border-b border-gray-400">
                        <td class="px-2 py-0.5 border-r border-gray-400">
                          ৫০ - ৬৪
                        </td>
                        <td class="px-2 py-0.5 border-gray-400">
                          জায়্যিদ
                        </td>
                      </tr>
                      <tr class="border-b border-gray-400">
                        <td class="px-2 py-0.5 border-r border-gray-400">
                          ৪০ - ৪৯
                        </td>
                        <td class="px-2 py-0.5 border-gray-400">
                          মাকবুল
                        </td>
                      </tr>
                      <tr class="border-b border-gray-400">
                        <td class="px-2 py-0.5 border-r border-gray-400">
                          ০ - ৩৯
                        </td>
                        <td class="px-2 py-0.5 border-gray-400">
                          রাসিব
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
              
              <div class="w-full px-14">
                <div class="left w-full">
                  <table class="w-full text-md text-left border border-gray-400">
                    <tbody>
                      <tr class="border-b border-gray-400">
                        <th class="px-2 py-1 border-r border-gray-400">
                          নাম
                        </th>
                        <td class="px-2 py-1 border-r border-gray-400" x-text="result.name">
                          আয়েশা সিদ্দিকা মনিরা
                        </td>
                        <th class="px-2 py-1 border-r border-gray-400">
                          আইডি নং
                        </th>
                        <td class="px-2 py-1 border-r border-gray-400" x-text="getBangla(result.studentId)">
                          ২০২৪০০০১
                        </td>
                      </tr>
                      <tr class="border-b border-gray-400">
                        <th class="px-2 py-1 border-r border-gray-400">
                          পিতার নাম
                        </th>
                        <td class="px-2 py-1 border-r border-gray-400" x-text="result.faName">
                          আব্দুল মালেক
                        </td>
                        <th class="px-2 py-1 border-r border-gray-400">
                          জামাত
                        </th>
                        <td class="px-2 py-1 border-r border-gray-400" x-text="result.class">
                          মিজান
                        </td>
                        
                      </tr>
                      <tr class="border-b border-gray-400">
                        <th scope="row" class="px-2 py-1 border-r border-gray-400">
                          মাতার নাম
                        </th>
                        <td class="px-2 py-1 border-r border-gray-400" x-text="result.maName">
                          আমেনা খাতুন
                        </td>
                        <th class="px-2 py-1 border-r border-gray-400">
                          বিভাগ
                        </th>
                        <td class="px-2 py-1 border-r border-gray-400" x-text="result.group">
                          কিতাব বিভাগ
                        </td>
                      </tr>
                    </tbody>
                  </table>
                  <table class="w-full text-sm text-left border border-gray-400 mt-4 text-center">
                    <tbody>
                      <tr class="border-b border-gray-400">
                        <th class="px-2 py-1 border-r border-gray-400">
                          ক্রমিক
                        </th>
                        <th class="px-2 py-1 border-r border-gray-400">
                          বিষয়
                        </th>
                        <th class="px-2 py-1 border-r border-gray-400">
                          পূর্ণমান
                        </th>
                        <th class="px-2 py-1 border-r border-gray-400">
                          প্রাপ্ত নাম্বার
                        </th>
                        <th class="px-2 py-1 border-r border-gray-400">
                          ক্লাসটেস্ট
                        </th>
                        <th class="px-2 py-1 border-r border-gray-400">
                          মোট নম্বর
                        </th>
                        <th class="px-2 py-1 border-r border-gray-400">
                          সর্বমোট
                        </th>
                        <th class="px-2 py-1 border-r border-gray-400">
                          গড় নম্বর
                        </th>
                        <th class="px-2 py-1 border-r border-gray-400">
                          বিভাগ
                        </th>
                      </tr>
                      
                      <template x-for="(r,index) in result.results" :key="index">
                        <tr class="border-b border-gray-400">
                          <td class="px-2 py-1 border-r border-gray-400" x-text="getBangla(index + 1)">
                            ১
                          </td>
                          <td class="px-2 py-1 border-r border-gray-400 text-left" x-text="r.name">
                            বাংলা
                          </td>
                          <td class="px-2 py-1 border-r border-gray-400">
                            ১০০
                          </td>
                          <td class="px-2 py-1 border-r border-gray-400" x-text="getBangla(r.test)">
                            ৯৬
                          </td>
                          <td class="px-2 py-1 border-r border-gray-400" x-text="getBangla(r.mark)">
                            ৯৬
                          </td>
                          <td class="px-2 py-1 border-r border-gray-400" x-text="getBangla(r.total)">
                            ৯৬
                          </td>
                          <template x-if="index === Math.floor(result.results.length / result.results.length) - 1">
                            <td :rowspan="result.results.length" class="px-2 py-1 border-r border-gray-400" style="vertical-align: middle;" x-text="getBangla(result.total)">
                              ৯৬
                            </td>
                          </template>
                          <template x-if="index === Math.floor(result.results.length / result.results.length) - 1">
                            <td :rowspan="result.results.length + 1" class="px-2 py-1 border-r border-gray-400" style="vertical-align: middle;" x-text="getBangla(result.avg)">
                              ৯৬
                            </td>
                          </template>
                          <template x-if="index === Math.floor(result.results.length / result.results.length) - 1">
                            <td :rowspan="result.results.length + 1" class="px-2 py-1 border-r border-gray-400 w-10" style="vertical-align: middle;" x-text="result.status">
                              ৯৬
                            </td>
                          </template>
                        </tr>
                      </template>
                      
                    </tbody>
                  </table>
                  
                </div>
                <div class="mt-5 right w-full flex items-center justify-between">
                  <div class="w-96 px-2 py-4 border border-gray-400">
                    <p>
                      <span class="font-bold text-lg"> শ্রেণী শিক্ষিকার মন্তব্য </span><br>
                      <span x-text="result.comment"></span>
                    </p>
                  </div>
                  <div>
                    <table class="w-full text-sm text-left border border-gray-400">
                      <tbody>
                        <tr class="border-b border-gray-400">
                          <td class="px-2 py-1 border-r border-gray-400">
                            মোট কার্যদিবস
                          </td>
                          <td class="px-2 py-1 border-r border-gray-400">
                            ০০ দিন
                          </td>
                        </tr>
                        <tr class="border-b border-gray-400">
                          <td class="px-2 py-1 border-r border-gray-400">
                            উপস্থিতি
                          </td>
                          <td class="px-2 py-1 border-r border-gray-400">
                            ০০ দিন
                          </td>
                        </tr>
                        <tr class="border-b border-gray-400">
                          <td class="px-2 py-1 border-r border-gray-400">
                            অনুপস্থিতি
                          </td>
                          <td class="px-2 py-1 border-r border-gray-400">
                            ০০ দিন
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
              
              <div class="w-full px-14 mt-20 flex items-center justify-between">
                <div>
                  <span>ফলাফল প্রকাশের তারিখ :</span>
                  <span x-text="new Intl.DateTimeFormat('bn').format(new Date())"></span>
                </div>
                <div>
                  <img class="w-28" src="./src/img/sign.jpg" alt="">
                  <span>মুহতামিমের সাক্ষর</span>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
  
  <script>

      return {

            { name: 'বিজ্ঞান' },
            { name: 'পদার্থবিজ্ঞান' },
            { name: 'রসায়ন' },
            { name: 'জীববিজ্ঞান' }
          ],
          'দশম': [
            { name: 'বাংলা ও ব্যাকরণ' },
            { name: 'কুরআন ও তাজবীদ' },
            { name: 'ইংরেজি ১ম ও ইংরেজি ২য়' },
            { name: 'ইতিহাস ও ভূগোল' },
            { name: 'তাফসির ও হাদিস' },
            { name: 'গণিত' },
            { name: 'আরবি সাহিত্য' },
            { name: 'বিজ্ঞান' },
            { name: 'পদার্থবিজ্ঞান' },
            { name: 'রসায়ন' },
            { name: 'জীববিজ্ঞান' }
          ]
        },
        results: [],
        resultRecords: {},
        
        // Initialize: Load saved results from localStorage
        init() {
          const savedRecords = localStorage.getItem('resultRecords');
          if (savedRecords) {
            this.resultRecords = JSON.parse(savedRecords);
          }
          this.loadStudents();
          this.loadResults();
        },
        
        // Load students for the selected class
        loadStudents() {
          this.results = this.students
            .filter(student => student.class === this.selectedClass)
            .map(student => ({
              examName: this.selectedExam,
              name: student.name,
              faName: student.faName,
              maName: student.maName,
              class: student.class,
              group: student.group,
              studentId: student.studentId,
              results: this.classSubjects[this.selectedClass].map(subject => ({
                name: subject.name,
                test: 0, // Class Test (max 20)
                mark: 0, // Exam Mark (max 80)
                total: 0
              })),
              total: 0,
              avg: 0,
              status: '',
              comment: 'সুন্দর ফলাফলের জন্য অভিনন্দন। আগামীতে আরো ভালো ফলাফলের জন্য দোয়া ও প্রত্যাশা করছি।'
            }));
        },
        
        // Load results for the selected exam and class
        loadResults() {
          const examKey = `${this.selectedExam}_${this.selectedClass}`;
          const savedResults = this.resultRecords[examKey] || [];
          this.results = this.results.map(student => {
            const saved = savedResults.find(r => r.studentId === student.studentId);
            if (saved) {
              const updatedResults = this.classSubjects[this.selectedClass].map((subject, index) => {
                const savedResult = saved.results.find(r => r.name === subject.name) || { test: 0, mark: 0, total: 0 };
                return {
                  name: subject.name,
                  test: savedResult.test,
                  mark: savedResult.mark,
                  total: savedResult.test + savedResult.mark
                };
              });
              return {
                ...student,
                results: updatedResults,
                total: this.calculateTotal(updatedResults),
                avg: this.calculateAverage(updatedResults),
                status: this.calculateStatus(this.calculateAverage(updatedResults)),
                comment: saved.comment
              };
            }
            return student;
          });
        },
        
        // Update student data and save
        updateStudent(student) {
          student.results = student.results.map(result => ({
            ...result,
            total: (result.test || 0) + (result.mark || 0)
          }));
          student.total = this.calculateTotal(student.results);
          student.avg = this.calculateAverage(student.results);
          student.status = this.calculateStatus(student.avg);
          this.saveResults();
        },
        
        // Save results to localStorage
        saveResults() {
          const examKey = `${this.selectedExam}_${this.selectedClass}`;
          this.resultRecords[examKey] = this.results;
          localStorage.setItem('resultRecords', JSON.stringify(this.resultRecords));
        },
        
        // Sorted results by total marks for position
        get sortedResults() {
          return this.results.slice().sort((a, b) => this.calculateTotal(b.results) - this.calculateTotal(a.results));
        },
        
        // Calculate total marks
        calculateTotal(results) {
          return results.reduce((sum, result) => sum + result.total, 0);
        },
        
        // Calculate average
        calculateAverage(results) {
          const total = this.calculateTotal(results);
          return Math.round(total / results.length);
        },
        
        // Calculate status based on average
        calculateStatus(avg) {
          if (avg >= 90) return 'মুমতায';
          if (avg >= 80) return 'জায়্যিদ জিদ্দান';
          if (avg >= 70) return 'জায়্যিদ';
          if (avg >= 60) return 'মাকবুল';
          return 'রাসিব';
        },
        
        // Calculate position based on total marks
        calculatePosition(student) {
          const sorted = this.sortedResults;
          return sorted.findIndex(s => s.studentId === student.studentId) + 1;
        },
        
        // Generate report
        generateReport() {
          if (this.results.length === 0) {
            alert('কোনো ছাত্রের তথ্য নেই। দয়া করে প্রথমে রেজাল্ট এন্ট্রি করুন।');
            return;
          }
          this.showReport = !this.showReport;
        },
        getGrade(score) {
          let grade
          if (score >= 80) {
            grade = "মুমতায";
          } else if (score >= 65) {
            grade = "জায়্যিদ জিদ্দান";
          } else if (score >= 50) {
            grade = "জায়্যিদ";
          } else if (score >= 40) {
            grade = "মাকবুল";
          } else {
            grade = "রাসিব";
          }
          return grade
        },
        getBangla(x) {
          let numbers = { '0': '০', '1': '১', '2': '২', '3': '৩', '4': '৪', '5': '৫', '6': '৬', '7': '৭', '8': '৮', '9': '৯' };
          var retStr = String(x);
          for (let n in numbers) {
            retStr = retStr.replace(new RegExp(n, 'g'), numbers[n]);
          }
          return retStr;
        },
        
        // Print report
        printReport() {
          /*const printContent = document.getElementById('reportContent').innerHTML;
          const originalContent = document.body.innerHTML;
          document.body.innerHTML = printContent;*/
          window.print();
          /*document.body.innerHTML = originalContent;
          window.location.reload();*/
        }
      };
    }
  </script>
