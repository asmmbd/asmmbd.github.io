<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>বেতন রশিদ</title>
  <link href='https://fonts.maateen.me/solaiman-lipi/font.css' rel='stylesheet' />
  <!-- html2pdf CDN link -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      font-family: SolaimanLipi;
    }

    .page {
      width: 14.8cm;
      height: 21.0cm;

    }

    .page img {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div class="relative page border border-0">
    <img src="./src/img/receipt.jpg">
    <div class="w-full absolute top-36 left-0 px-3 text-center">
      <h1 class="font-bold text-xl"> বেতন রশিদ </h1>
    </div>
    <div class="w-full absolute top-48 left-0 px-4">
      <table class="w-full text-sm text-left border border-gray-400">
        <tbody>
          <tr class="border-b border-gray-400">
            <th scope="row" class="px-2 py-1 border-r border-gray-400">
              নাম
            </th>
            <td class="px-2 py-1 border-r border-gray-400">
              আয়েশা সিদ্দিকা মনিরা
            </td>
            <th class="px-2 py-1 border-r border-gray-400">
              জামাত
            </th>
            <td class="px-2 py-1 border-r border-gray-400">
              মিজান
            </td>
          </tr>
          <tr class="border-b border-gray-400">
            <th class="px-2 py-1 border-r border-gray-400">
              বিভাগ
            </th>
            <td class="px-2 py-1 border-r border-gray-400">
              কিতাব বিভাগ
            </td>
            <th class="px-2 py-1 border-r border-gray-400">
              তারিখ
            </th>
            <td class="px-2 py-1 border-r border-gray-400">
              ২ জুলাই, ২০২৪
            </td>
          </tr>
          <tr class="border-b border-gray-400">
            <th scope="row" class="px-2 py-1 border-r border-gray-400">
              আইডি নং
            </th>
            <td class="px-2 py-1 border-r border-gray-400">
              ২০২৪০০০১
            </td>
            <th class="px-2 py-1 border-r border-gray-400">
              রশিদ নং
            </th>
            <td class="px-2 py-1">
              ২৪০০০১
            </td>
          </tr>
        </tbody>
      </table>

      <table class="w-full text-sm text-left border border-gray-400 mt-4">
        <thead class="text-xs">
          <tr class="border-b border-gray-400 text-center">
            <th scope="col" class="px-3 py-2 border-r border-gray-400 w-10">
              ক্রমিক নং
            </th>
            <th scope="col" class="px-3 py-2 border-r border-gray-400">
              বিবরণ
            </th>
            <th scope="col" class="px-3 py-2">
              পরিমাণ
            </th>
          </tr>
        </thead>
        <tbody>
          <tr class="border-b border-gray-400">
            <th class="px-3 py-1.5 w-10 text-center border-r border-gray-400">
              ১
            </th>
            <th class="px-3 py-1.5 border-r border-gray-400">
              ভর্তি ফি
            </th>
            <td class="px-3 py-1.5 text-center border-gray-400">
              ১০০০
            </td>
          </tr>
          <tr class="border-b border-gray-400">
            <th class="px-3 py-1.5 w-10 text-center border-r border-gray-400">
              ২
            </th>
            <th class="px-3 py-1.5 border-r border-gray-400">
              মাসিক বেতন
            </th>
            <td class="px-3 py-1.5 text-center">
              ০
            </td>
          </tr>
          <tr class="border-b border-gray-400">
            <th class="px-3 py-1.5 w-10 text-center border-r border-gray-400">
              ৩
            </th>
            <th class="px-3 py-1.5 border-r border-gray-400">
              সেশন ফি
            </th>
            <td class="px-3 py-1.5 text-center">
              ০
            </td>
          </tr>
          <tr class="border-b border-gray-400">
            <th class="px-3 py-1.5 w-10 text-center border-r border-gray-400">
              ৪
            </th>
            <th class="px-3 py-1.5 border-r border-gray-400">
              ডায়েরি
            </th>
            <td class="px-3 py-1.5 text-center">
              ২০০
            </td>
          </tr>
          <tr class="border-b border-gray-400">
            <th class="px-3 py-1.5 w-10 text-center border-r border-gray-400">
              ৫
            </th>
            <th class="px-3 py-1.5 border-r border-gray-400">
              আবাসিক ফি
            </th>
            <td class="px-3 py-1.5 text-center">
              ০
            </td>
          </tr>
          <tr class="border-b border-gray-400">
            <th class="px-3 py-1.5 w-10 text-center border-r border-gray-400">
              ৬
            </th>
            <th class="px-3 py-1.5 border-r border-gray-400">
              পরীক্ষা ফি
            </th>
            <td class="px-3 py-1.5 text-center">
              ০
            </td>
          </tr>
          <tr class="border-b border-gray-400">
            <th class="px-3 py-1.5 w-10 text-center border-r border-gray-400">
              ৭
            </th>
            <th class="px-3 py-1.5 border-r border-gray-400">
              আইডি কার্ড
            </th>
            <td class="px-3 py-1.5 text-center">
              ০
            </td>
          </tr>
          <tr class="border-b border-gray-400">
            <th class="px-3 py-1.5 w-10 text-center border-r border-gray-400">
              ৮
            </th>
            <th class="px-3 py-1.5 border-r border-gray-400">
              বিবিধ
            </th>
            <td class="px-3 py-1.5 text-center">
              ০
            </td>
          </tr>
          <tr class="border-b border-gray-400">
            <th scope="row" class="px-3 py-1.5 font-bold  whitespace-nowrap text-right border-r border-gray-400" colspan="2">
              মোট
            </th>
            <td class="px-3 py-1.5 font-bold text-center">
              ১০০০
            </td>
          </tr>
        </tbody>
      </table>
      <div class="p-3 mt-12 text-right">
        <span> আদায়কারীর স্বাক্ষর</span>
      </div>


    </div>

  </div>
</body>

</html>
