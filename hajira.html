<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href='https://fonts.maateen.me/solaiman-lipi/font.css' rel='stylesheet' />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    * {
      font-family: SolaimanLipi;
    }

    .page {
      width: 29.7cm;
      height: 21cm;
    }

    .page img {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div x-data="data()">
    <h1 class="mt-2 text-center text-4xl font-bold">আয়েশা সিদ্দিকা (রা.) মহিলা মাদরাসা</h1>
    <h1 class="text-center text-xl font-semibold">মারকাজ মসজিদ পাড়া, কলেজ মোড়, মেহেরপুর</h1>
    <h1 class="text-center text-lg font-normal mb-2">শিক্ষার্থী হাজিরা </h1>
    <table class="w-full text-sm text-left border border-gray-400">
      <tbody class="text-center">
        <tr class="border-b border-gray-400">
         <!-- <td class="px-2 py-1 border-r border-gray-400">
            নং
          </td>-->
          <td class="px-2 py-1 border-r border-gray-400">
            আইডি নং
          </td>
          <td class="px-2 py-1 border-r border-gray-400 w-full">
            নাম
          </td>
          <template x-for="(number, index) in numbers">
            <td class="px-2 py-1 border-r border-gray-400" x-text="getBangla(index + 1)">
            </td>
          </template>
        </tr>
        <template x-for="(student,index) in students">
          <tr class="border-b border-gray-400">
            <!--<td class="px-2 py-1 border-r border-gray-400" x-text="getBangla(index + 1)"></td>-->
            <td class="px-2 py-1 border-r border-gray-400" x-text="getBangla(student?.studentId)"></td>
            <td class="px-2 py-1 border-r border-gray-400 w-full" x-text="student?.stname">
            </td>
            <template x-for="(number, index) in numbers">
              <td class="px-2 py-1 border-r border-gray-400" x-text="number">
              </td>
            </template>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
  <script>
    const { Client, Databases, Query, ID } = Appwrite;
    const client = new Client();
    client
      .setEndpoint('https://cloud.appwrite.io/v1')
      .setProject('652c1374db243c864a6c');
    const databases = new Databases(client);

    function data() {
      return {
        students: [],
        searchStudent() {
          const promise = databases.listDocuments('652c16162f939c821f75', '652c16266c0f7c2fccd8', [Query.limit(60)]);
          promise.then((ress) => {
            this.students = ress.documents;
            console.log(ress)
          }, function(error) {
            console.log(error);
          });
        },
        getBangla(x) {
          let numbers = { '0': '০', '1': '১', '2': '২', '3': '৩', '4': '৪', '5': '৫', '6': '৬', '7': '৭', '8': '৮', '9': '৯' };
          var retStr = String(x);
          for (let n in numbers) {
            retStr = retStr.replace(new RegExp(n, 'g'), numbers[n]);
          }
          return retStr;
        },
        get numbers() {
          return ['', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '']
        },
        init() {
          this.searchStudent()
        }
      }
    }
  </script>
</body>

</html>
