  <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>

  <script>
    const { Client, Databases, Query, ID } = Appwrite;
    const client = new Client();
    client
      .setEndpoint('https://cloud.appwrite.io/v1')
      .setProject('652c1374db243c864a6c');
    const databases = new Databases(client);


    function data() {
      return {
        results: [],
        getResult() {
          const promise = databases.listDocuments('652c16162f939c821f75', '65d42b3c83e7217b2aac');
          promise.then((ress) => {
            // this.results = ress.documents.filter(result => result.examName === 'প্রথম সাময়িক পরীক্ষা ২০২৪')
            this.results = ress.documents;
          }, function(error) {
            console.log(error);
            // console.log(this.results)
          });
        },
        getGrade(score) {
          let grade
          if (score >= 80) {
            grade = "মুমতায";
          } else if (score >= 65) {
            grade = "জায়্যিদ জিদ্দান";
          } else if (score >= 50) {
            grade = "জায়্যিদ";
          } else if (score >= 40) {
            grade = "মাকবুল";
          } else {
            grade = "রাসিব";
          }
          return grade
        },
        getBangla(x) {
          let numbers = { '0': '০', '1': '১', '2': '২', '3': '৩', '4': '৪', '5': '৫', '6': '৬', '7': '৭', '8': '৮', '9': '৯' };
          var retStr = String(x);
          for (let n in numbers) {
            retStr = retStr.replace(new RegExp(n, 'g'), numbers[n]);
          }
          return retStr;
        },
        init() {
          this.getResult()
        }
      }
    }
  </script>
